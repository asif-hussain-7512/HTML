<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentra Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(15,23,42,0.8),
    rgba(15,23,42,0.8)),

    url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1600&auto=format&fit=crop");

    background-size:cover;
    background-position:center;
    color:white;
}

.container{
    width:320px;
    padding:30px;
    background:rgba(30,41,59,0.9);
    border-radius:12px;
    text-align:center;
    box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

h1{
    color:#38bdf8;
    margin-bottom:10px;
}

p{
    color:#cbd5e1;
    margin-bottom:20px;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:6px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

.footer{
    margin-top:15px;
    font-size:14px;
}

.footer a{
    color:#38bdf8;
    text-decoration:none;
}

@media(max-width:500px){
    .container{
        width:90%;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>Zentra Login</h1>

    <p>Access your productivity dashboard</p>

    <input type="email" placeholder="Enter Email">

    <input type="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <div class="footer">
        New User? <a href="#">Sign Up</a>
    </div>

</div>

<script>

function login(){

    alert("Login Successful!");

    window.location.href="dashboard.html";
}

</script>

</body>
</html>
