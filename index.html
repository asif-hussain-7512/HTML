<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentra Scheduler</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

header{
    background:#1e293b;
    padding:15px;
}

header h1{
    margin:0;
    color:#38bdf8;
}

.hero{
    padding:80px 20px;
}

.hero h2{
    font-size:40px;
}

.hero span{
    color:#38bdf8;
}

.hero p{
    max-width:600px;
    margin:auto;
    line-height:1.6;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:5px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

.features{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:40px 20px;
}

.card{
    width:220px;
    padding:20px;
    border-radius:10px;
    background:#1e293b;
}

.card h3{
    color:#38bdf8;
}

footer{
    background:#020617;
    padding:15px;
    margin-top:20px;
}

</style>
</head>

<body>

<header>
    <h1>Zentra Scheduler</h1>
</header>

<section class="hero">

    <h2>Manage Time with <span>Zentra</span></h2>

    <p>
        Organize tasks, schedules, and productivity in one smart dashboard.
    </p>

    <a href="auth.html">
        <button>Get Started</button>
    </a>

</section>

<section class="features">

    <div class="card">
        <h3>Scheduling</h3>
        <p>Manage daily schedules easily.</p>
    </div>

    <div class="card">
        <h3>Tasks</h3>
        <p>Organize and track activities.</p>
    </div>

    <div class="card">
        <h3>Analytics</h3>
        <p>Monitor productivity performance.</p>
    </div>

</section>

<footer>
    <p>© 2026 Zentra Scheduler</p>
</footer>

</body>
</html>
